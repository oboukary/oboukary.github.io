<script>
(function () {
  function cleanTitle() {
    var path = window.location.pathname.replace(/\/+$/, "");
    var isHome = path === "" || /\/(index(\.html)?)?$/.test(path);

    if (isHome) {
      // Page d'accueil : nom seulement
      document.title = "Home";
      return;
    }

    // Autres pages : on nettoie juste les balises HTML résiduelles et le suffixe
    var t = document.title || "";
    t = t.replace(/<[^>]*>/g, "");
    t = t.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
    t = t.replace(/\s[-–—]\s.*$/, "").trim();
    document.title = t || "Home";
  }
  cleanTitle();
  document.addEventListener("DOMContentLoaded", cleanTitle);
})();
</script>
