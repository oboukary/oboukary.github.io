<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#023475"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg4)"/>

  <!-- Bar chart silhouette -->
  <g opacity="0.55">
    <rect x="60"  y="230" width="26" height="70"  fill="#ef4444"/>
    <rect x="100" y="205" width="26" height="95"  fill="#eab308"/>
    <rect x="140" y="180" width="26" height="120" fill="#22c55e"/>
    <rect x="180" y="195" width="26" height="105" fill="#eab308"/>
    <rect x="220" y="160" width="26" height="140" fill="#22c55e"/>
  </g>

  <!-- Trend line -->
  <g stroke="#38bdf8" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M280 235 L330 215 L380 190 L430 165 L480 140 L530 120" stroke-linecap="round"/>
    <circle cx="330" cy="215" r="4" fill="#38bdf8"/>
    <circle cx="430" cy="165" r="4" fill="#38bdf8"/>
    <circle cx="530" cy="120" r="4" fill="#38bdf8"/>
  </g>

  <g fill="#fff" font-family="-apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <text x="300" y="60" font-size="14" opacity="0.7" letter-spacing="3">DASHBOARD &#183; DATA ANALYTICS</text>
    <text x="300" y="105" font-size="32" font-weight="700">Macroéconomie</text>
    <text x="300" y="132" font-size="15" opacity="0.8">Burkina Faso &#183; FRED &amp; World Bank</text>
  </g>
</svg>
