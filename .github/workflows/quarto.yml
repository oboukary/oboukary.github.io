on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Le billet "Vasicek" utilise le moteur knitr (chunks R) + reticulate,
      # il faut donc R et ses paquets dans le runner.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages (moteur knitr + pont reticulate)
        # readr est utilisé par posts/01_regression_lineaire ; il est ajouté par
        # précaution au cas où une version de Quarto invaliderait son cache freeze
        # et forcerait une ré-exécution du chunk R.
        run: install.packages(c("knitr", "rmarkdown", "reticulate", "readr"))
        shell: Rscript {0}

      - name: Install Python and Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install jupyter
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      # reticulate (appelé depuis le chunk R du billet) doit pointer vers
      # l'interpréteur Python ci-dessus, qui contient numpy et matplotlib.
      - name: Point reticulate to the CI Python
        run: echo "RETICULATE_PYTHON=$(which python)" >> "$GITHUB_ENV"

      - name: Render site
        run: quarto render

      - name: Generate CV PDF
        run: python scripts/generate_cv_pdf.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
