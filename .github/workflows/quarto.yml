on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Le billet "Vasicek" utilise le moteur knitr (chunks R) + reticulate,
      # il faut donc R et ses paquets dans le runner.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages (moteur knitr + pont reticulate)
        # readr est utilisé par posts/01_regression_lineaire ; il est ajouté par
        # précaution au cas où une version de Quarto invaliderait son cache freeze
        # et forcerait une ré-exécution du chunk R.
        # Les paquets dplyr/ggplot2/plotly/scales/here/jsonlite/purrr servent au
        # dashboard projects/04-burkina-macro-dashboard ; ils ne sont normalement
        # pas ré-exécutés (cache freeze versionné + data/macro_data.rds commité),
        # mais sont installés par sécurité si le freeze venait à être invalidé.
        run: install.packages(c("knitr", "rmarkdown", "reticulate", "readr", "dplyr", "ggplot2", "plotly", "scales", "here", "jsonlite", "purrr", "tidyr"))
        shell: Rscript {0}

      - name: Install Python and Dependencies
        uses: actions/setup-python@v5
        with:
          # On reste en 3.13 (ne pas passer en 3.14) : playwright 1.49.0 fige
          # greenlet 3.1.1, qui n'a pas de wheel cp314 et ne compile pas contre
          # l'API frame de CPython 3.14 (echec du build pip). scikit-learn 1.6.0
          # et pandas 2.2.3 n'ont pas non plus de wheel cp314. Tout est en wheel
          # prebuilt en 3.13. Pour passer en 3.14, bumper d'abord playwright.
          python-version: '3.13'
          cache: 'pip'
      - run: pip install jupyter
      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      # reticulate (appelé depuis le chunk R du billet) doit pointer vers
      # l'interpréteur Python ci-dessus, qui contient numpy et matplotlib.
      - name: Point reticulate to the CI Python
        run: echo "RETICULATE_PYTHON=$(which python)" >> "$GITHUB_ENV"

      - name: Render site
        run: quarto render

      - name: Generate CV PDF
        run: python scripts/generate_cv_pdf.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
