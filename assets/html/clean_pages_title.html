<script>
(function () {
  // Nettoyage immédiat du titre de l'onglet :
  // 1) supprime tout sous-titre <span>...</span> hérité du title Quarto
  // 2) supprime les suffixes de page (" – Section")
  function cleanTitle() {
    var t = document.title || "";
    t = t.replace(/<[^>]*>/g, "");          // strip toutes les balises HTML
    t = t.replace(/\s[-–—]\s.*$/, "");       // strip suffixe page
    t = t.replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
    document.title = t.trim();
  }
  cleanTitle();
  document.addEventListener("DOMContentLoaded", cleanTitle);
})();
</script>
